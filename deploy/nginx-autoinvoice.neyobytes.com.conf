# autoinvoice.neyobytes.com — Expo web (mobile/dist) + API proxy to :4002
# Run: sudo certbot --nginx -d autoinvoice.neyobytes.com  (adds the 443 ssl block)

server {
    server_name autoinvoice.neyobytes.com;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    root /home/ubuntu/neyobytes-auto-invoice/mobile/dist;
    index index.html;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # Default for HTML (route .html) + API: never serve from the disk cache.
    # Without this the browser heuristic-caches the old index.html, which points
    # at an OLD content-hashed bundle (or the pre-fix double-#root build) → white
    # screen + stale /auth/me 401. The hashed /_expo + /assets bundles override
    # this below with `immutable` (safe: their filename changes every deploy).
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;

    # Proxy defaults inherited by all API locations: match the backend
    # bodyLimit (25 MiB) so base64 photos reach Hono, and give slow upstreams
    # (vision-LLM extraction, LHDN submission) headroom past nginx 60s default.
    client_max_body_size 25M;
    proxy_read_timeout 120s;
    proxy_send_timeout 120s;

    # ── API proxy: backend routes mount WITHOUT an /api prefix ──
    location /auth {
        proxy_pass http://127.0.0.1:4002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }
    location /invoices {
        proxy_pass http://127.0.0.1:4002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }
    location /myinvois {
        proxy_pass http://127.0.0.1:4002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }
    location /health {
        proxy_pass http://127.0.0.1:4002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Content-hashed JS bundle — filename changes every build, so cache forever.
    location /_expo/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # Content-hashed fonts — also immutable (filename is hashed).
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/autoinvoice.neyobytes.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/autoinvoice.neyobytes.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}

server {
    if ($host = autoinvoice.neyobytes.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    server_name autoinvoice.neyobytes.com;

    listen 80;
    return 404; # managed by Certbot


}